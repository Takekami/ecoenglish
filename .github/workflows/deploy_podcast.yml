name: Deploy EcoEnglish Lambda Container

on:                       # 手動トリガーだけ
  workflow_dispatch:

permissions:
  id-token: write         # OIDC でクロスアカウント Assume
  contents: read

env:                      # 変えるのはここだけ
  AWS_REGION: ap-southeast-2
  ECR_REGISTRY: 651706750291.dkr.ecr.ap-southeast-2.amazonaws.com
  ECR_REPOSITORY: ecoenglish
  FUNCTION_NAME: ecoenglish

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1) リポジトリをチェックアウト
      - uses: actions/checkout@v4

      # 2) GitHub → AWS ロールを Assume（OIDC）
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # 3) ECR へログイン
      - uses: aws-actions/amazon-ecr-login@v2

      # 4) Docker build & push
      - name: Build and push image
        env:
          IMAGE_URI: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          docker build --platform linux/amd64 --provenance=false -t "$IMAGE_URI" .
          docker tag "$IMAGE_URI" "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"
          docker push "$IMAGE_URI"
          docker push "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      # 5) Lambda 関数を更新
      - name: Update Lambda
        run: |
          aws lambda update-function-code \
            --function-name $FUNCTION_NAME \
            --image-uri $IMAGE_URI \
            --region $AWS_REGION
